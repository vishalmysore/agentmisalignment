# Tools4AI Configuration for Agent Misalignment
agent.provider=openai
# Key will be passed as -DopenAiKey
openAiBaseURL=https://integrate.api.nvidia.com/v1
openAiModelName=nvidia/llama-3.1-nemotron-70b-instruct
t4a.ai.model=openai

# Replicating scanning properties from working projects
action.packages.to.scan=io.github.vishalmysore.misalignment.examples
t4a.action.packages=io.github.vishalmysore.misalignment.examples
